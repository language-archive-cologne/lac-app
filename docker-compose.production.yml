volumes:
  lacos_production_postgres_data: {}
  lacos_production_postgres_data_backups: {}
  lacos_production_redis_data: {}

networks:
  lacos_production_network:
    driver: bridge

services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: web-run-stage
      args:
        UV_LINK_MODE: copy
    image: lacos_production_django
    container_name: lacos_production_django
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - pgbouncer
      - redis
    volumes:
      - .:/app:z
      - /etc/shibboleth:/etc/shibboleth:ro
      - /opt/lacos/lac-guidelines:/app/lac-guidelines:ro
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
      - ./.envs/.production/.storage
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "6432"
      CONN_MAX_AGE: "0"
      DISABLE_SERVER_SIDE_CURSORS: "true"
      SAML_LOGIN_ENABLED: "true"
      SAML_DJANGO_USER_MAIN_ATTRIBUTE: "username"
      SAML_USE_NAME_ID_AS_USERNAME: "false"
      SAML_IDP_METADATA_LOCAL: ""
      SAML_IDP_METADATA_REMOTE: "https://infra.clarin.eu/aai/prod_md_about_clarin_erics_idp.xml"
      SAML_METADATA_MDQ_URL: "https://mdq.aai.dfn.de/"
      SAML_METADATA_REFRESH_ENABLED: "false"
      SAML2_DISCO_URL: ""
      SAML_AUTHN_REQUESTS_SIGNED: "false"
      SAML_DIRECT_IDP_SELECTION_ENABLED: "true"
      EDUGAIN_METADATA_URL: "https://www.aai.dfn.de/fileadmin/metadata/dfn-aai-edugain+idp-metadata.xml"
      GUIDELINES_REPO_URL: /app/lac-guidelines
      LAC_MEDIA_TMP_DIR: "/app/.tmp/media-processing"
      # Allow Matomo analytics (matomo.js + tracking beacons) through the CSP.
      CSP_EXTRA_SCRIPT_ORIGINS: "https://matomo.rrz.uni-koeln.de"
    ports:
      - '127.0.0.1:8103:8000'
    command: /start-production
    networks:
      - lacos_production_network
    dns:
      - ${DNS_PRIMARY}
      - ${DNS_SECONDARY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${S3_HOSTNAME}:${S3_IP}"

  pgbouncer:
    build:
      context: .
      dockerfile: ./compose/production/pgbouncer/Dockerfile
    image: lacos_production_pgbouncer
    container_name: lacos_production_pgbouncer
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - postgres
    env_file:
      - ./.envs/.production/.postgres
    environment:
      PGBOUNCER_SERVER_HOST: postgres
      PGBOUNCER_SERVER_PORT: "5432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "500"
      PGBOUNCER_DEFAULT_POOL_SIZE: "30"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_QUERY_TIMEOUT: "300"
    ports:
      - '127.0.0.1:6434:6432'
    networks:
      - lacos_production_network

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: lacos_production_postgres
    container_name: lacos_production_postgres
    restart: unless-stopped
    command: postgres -c max_connections=200 -c shared_preload_libraries=pg_stat_statements
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - lacos_production_postgres_data:/var/lib/postgresql/data
      - lacos_production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres
    ports:
      - '127.0.0.1:5434:5432'
    networks:
      - lacos_production_network

  redis:
    image: "redis:8.2-alpine@sha256:a308ca111032fa8f306a2dc7be7ba5deb8b777ed5d258c733cddba48a1fd7904"
    container_name: lacos_production_redis
    restart: unless-stopped
    command: redis-server --loglevel warning
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - lacos_production_redis_data:/data
    ports:
      - '127.0.0.1:6371:6379'
    networks:
      - lacos_production_network

  huey:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: worker-run-stage
      args:
        UV_LINK_MODE: copy
    image: lacos_production_huey
    container_name: lacos_production_huey
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - django
      - pgbouncer
      - redis
    volumes:
      - .:/app:z
      - /etc/shibboleth:/etc/shibboleth:ro
      - lacos_production_postgres_data_backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_DOCKER_BIN:-/usr/bin/docker}:/usr/bin/docker:ro
      - ${HOST_DOCKER_COMPOSE_PLUGIN:-/usr/libexec/docker/cli-plugins/docker-compose}:/usr/libexec/docker/cli-plugins/docker-compose:ro
    group_add:
      - "${DOCKER_GID:-999}"
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
      - ./.envs/.production/.storage
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "6432"
      CONN_MAX_AGE: "0"
      DISABLE_SERVER_SIDE_CURSORS: "true"
      SAML_LOGIN_ENABLED: "true"
      SAML_DJANGO_USER_MAIN_ATTRIBUTE: "username"
      SAML_USE_NAME_ID_AS_USERNAME: "false"
      SAML_IDP_METADATA_LOCAL: ""
      SAML_IDP_METADATA_REMOTE: "https://infra.clarin.eu/aai/prod_md_about_clarin_erics_idp.xml"
      SAML_METADATA_MDQ_URL: "https://mdq.aai.dfn.de/"
      SAML_METADATA_REFRESH_ENABLED: "false"
      SAML2_DISCO_URL: ""
      SAML_AUTHN_REQUESTS_SIGNED: "false"
      SAML_DIRECT_IDP_SELECTION_ENABLED: "true"
      EDUGAIN_METADATA_URL: "https://www.aai.dfn.de/fileadmin/metadata/dfn-aai-edugain+idp-metadata.xml"
      DB_BACKUP_ENABLED: "true"
      DB_BACKUP_COMPOSE_FILE: "docker-compose.production.yml"
      DB_BACKUP_COMPOSE_PROJECT_DIR: "/app"
      DB_BACKUP_COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME:-lac-app}"
      HUEY_IMMEDIATE: "false"
      HUEY_WORKERS: "4"
      LAC_MEDIA_TMP_DIR: "/app/.tmp/media-processing"
    command: /bin/sh -c "python manage.py run_huey"
    networks:
      - lacos_production_network
    dns:
      - ${DNS_PRIMARY}
      - ${DNS_SECONDARY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${S3_HOSTNAME}:${S3_IP}"

  theme:
    image: node:22-alpine
    container_name: lacos_production_theme
    working_dir: /app/theme/static_src
    volumes:
      - .:/app:z
    command: sh -c "npm ci && npm run build"
    profiles:
      - build
