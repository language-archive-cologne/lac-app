volumes:
  lacos_production_postgres_data: {}
  lacos_production_postgres_data_backups: {}
  lacos_production_traefik: {}
  


services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile

    image: lacos_production_django
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    environment:
      SAML_LOGIN_ENABLED: ${SAML_LOGIN_ENABLED:-false}
      SAML_SP_BASE_URL: ${SAML_SP_BASE_URL:-https://lacos.uni-koeln.de}
      SAML_IDP_METADATA_LOCAL: ${SAML_IDP_METADATA_LOCAL:-/app/shibboleth.xml}
      SAML_SP_CERT_FILE: ${SAML_SP_CERT_FILE:-}
      SAML_SP_KEY_FILE: ${SAML_SP_KEY_FILE:-}
      SAML_XMLSEC_BINARY: ${SAML_XMLSEC_BINARY:-/usr/bin/xmlsec1}
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: lacos_production_postgres
    volumes:
      - lacos_production_postgres_data:/var/lib/postgresql/data
      - lacos_production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres

  traefik:
    build:
      context: .
      dockerfile: ./compose/production/traefik/Dockerfile
    image: lacos_production_traefik
    depends_on:
      - django
    volumes:
      - lacos_production_traefik:/etc/traefik/acme
    ports:
      - '0.0.0.0:8080:80'
      - '0.0.0.0:8443:443'

  redis:
    image: docker.io/redis:6
    

  awscli:
    build:
      context: .
      dockerfile: ./compose/production/aws/Dockerfile
    env_file:
      - ./.envs/.production/.django
    volumes:
      - lacos_production_postgres_data_backups:/backups:z
