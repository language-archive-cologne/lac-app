volumes:
  lacos_local_postgres_data: {}
  lacos_local_postgres_data_backups: {}
  lacos_local_redis_data: {}
  minio_data: {}

networks:
  lacos_network_ws:
    driver: bridge

services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: web-run-stage
    image: lacos_local_django
    restart: "on-failure:3"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      pgbouncer:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - .:/app:z
      - ../lac-guidelines:/lac-guidelines:ro
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
      - ./.envs/.local/.storage
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "6432"
      CONN_MAX_AGE: "0"
      DISABLE_SERVER_SIDE_CURSORS: "true"
      SAML_LOGIN_ENABLED: "true"
      SAML_DJANGO_USER_MAIN_ATTRIBUTE: "username"
      SAML_USE_NAME_ID_AS_USERNAME: "false"
      SAML_SP_BASE_URL: "http://localhost:8101"
      SAML2_DISCO_URL: "https://discovery.clarin.eu/feed/edugain"
      SAML_IDP_METADATA_LOCAL: "/app/shibboleth.xml"
      LAC_MEDIA_TMP_DIR: "/app/.tmp/media-processing"
    ports:
      - '127.0.0.1:8101:8000'
    command: /bin/bash -lc "python manage.py migrate && uvicorn config.asgi:application --host 0.0.0.0 --reload --reload-include '*.html' --no-access-log"
    networks:
      - lacos_network_ws

  pgbouncer:
    build:
      context: .
      dockerfile: ./compose/production/pgbouncer/Dockerfile
    image: lacos_local_pgbouncer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.envs/.local/.postgres
    environment:
      PGBOUNCER_SERVER_HOST: postgres
      PGBOUNCER_SERVER_PORT: "5432"
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "500"
      PGBOUNCER_DEFAULT_POOL_SIZE: "30"
      PGBOUNCER_RESERVE_POOL_SIZE: "10"
      PGBOUNCER_QUERY_TIMEOUT: "300"
    ports:
      - "127.0.0.1:6431:6432"
    networks:
      - lacos_network_ws

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: lacos_production_postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - lacos_local_postgres_data:/var/lib/postgresql/data
      - lacos_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p $${POSTGRES_PORT:-5432} -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lacos_network_ws

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_ALLOW_CORS_ORIGIN: "*"
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9101"
      MINIO_DOMAIN_NAME: "localhost:9100"
      MINIO_LOGGER: "console"
      MINIO_LOGGER_LEVEL: "debug"
      MINIO_CORS_ALLOW_ORIGINS: "*"
      MINIO_CORS_ALLOW_METHODS: "GET,PUT,POST,DELETE,OPTIONS"
      MINIO_CORS_ALLOW_HEADERS: "*"
      MINIO_CORS_EXPOSE_HEADERS: "ETag"
      MINIO_CORS_MAX_AGE_SECONDS: "3600"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lacos_network_ws


  redis:
    image: "redis:8.2-alpine@sha256:a308ca111032fa8f306a2dc7be7ba5deb8b777ed5d258c733cddba48a1fd7904"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - lacos_local_redis_data:/data
    ports:
      - "127.0.0.1:6381:6379"
    networks:
      - lacos_network_ws
    command: redis-server --appendonly yes

  huey:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      target: worker-run-stage
    image: lacos_local_huey
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - django
      - pgbouncer
      - redis
    volumes:
      - .:/app:z
      - ../lac-guidelines:/lac-guidelines:ro
      - lacos_local_postgres_data_backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_DOCKER_BIN:-/usr/bin/docker}:/usr/bin/docker:ro
      - ${HOST_DOCKER_COMPOSE_PLUGIN:-/usr/libexec/docker/cli-plugins/docker-compose}:/usr/libexec/docker/cli-plugins/docker-compose:ro
    group_add:
      - "${DOCKER_GID:-999}"
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
      - ./.envs/.local/.storage
    environment:
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "6432"
      CONN_MAX_AGE: "0"
      DISABLE_SERVER_SIDE_CURSORS: "true"
      SAML_LOGIN_ENABLED: "true"
      SAML_DJANGO_USER_MAIN_ATTRIBUTE: "username"
      SAML_USE_NAME_ID_AS_USERNAME: "false"
      SAML_SP_BASE_URL: "http://localhost:8101"
      SAML2_DISCO_URL: "https://discovery.clarin.eu/feed/edugain"
      SAML_IDP_METADATA_LOCAL: "/app/shibboleth.xml"
      DB_BACKUP_ENABLED: "false"
      HUEY_WORKERS: "1"
      LAC_MEDIA_TMP_DIR: "/app/.tmp/media-processing"
    command: /bin/sh -c "python manage.py run_huey"
    networks:
      - lacos_network_ws

  node:
    image: node:22-alpine
    depends_on:
      - django
    working_dir: /app/theme/static_src
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/app:z
    command: /bin/sh -c "npm install && npm run dev"
    tty: true
    networks:
      - lacos_network_ws
