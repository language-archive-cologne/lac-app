volumes:
  lacos_local_postgres_data: {}
  lacos_local_postgres_data_backups: {}
  minio_data: {}

networks:
  lacos_network:
    driver: bridge

services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: lacos_local_django
    container_name: lacos_local_django
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
      - ./.envs/.local/.storage
    ports:
      - '8000:8000'
    command: /start
    networks:
      - lacos_network

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: lacos_production_postgres
    container_name: lacos_local_postgres
    volumes:
      - lacos_local_postgres_data:/var/lib/postgresql/data
      - lacos_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    networks:
      - lacos_network

  minio:
    image: minio/minio
    container_name: lacos_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_ALLOW_CORS_ORIGIN: "*"
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
      MINIO_DOMAIN_NAME: "localhost:9000"
      MINIO_LOGGER: "console"
      MINIO_LOGGER_LEVEL: "debug"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lacos_network

  node:
    image: node:latest
    container_name: node_tailwind_builder
    depends_on:
      - django
    working_dir: /app/theme/static_src 
    volumes:
      - .:/app:z
    command: /bin/sh -c "npm install && npm run dev"
    tty: true
    networks:
      - lacos_network

  test-js:
    image: node:latest
    container_name: lacos_test_js
    volumes:
      - .:/app:z
    working_dir: /app/lacos
    command: /bin/sh -c "npm install && npm test"
    networks:
      - lacos_network
