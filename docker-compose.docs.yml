services:
  docs:
    image: lacos_local_docs
    container_name: lacos_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./lacos:/app/lacos:z
    ports:
      - '9000:9000'
    command: /start-docs
