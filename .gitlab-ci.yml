stages:
  - deploy

deploy_dev:
  stage: deploy
  image: alpine:latest
  only:
    - dev
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cd /opt/lacos/lac-app && git pull && docker compose -f docker-compose.dev.yml exec -T django python manage.py collectstatic --noinput && docker compose -f docker-compose.dev.yml restart django"
  environment:
    name: development
    url: https://dev.lacos.uni-koeln.de
