stages:
  - deploy

deploy_dev:
  stage: deploy
  image: alpine:latest
  tags:
    - charch
  only:
    - dev
  before_script:
    - apk add --no-cache openssh-client curl bind-tools busybox-extras
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - cp "$SSH_PRIVATE_KEY" ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-add ~/.ssh/deploy_key
    - 'echo "Runner public IP: $(curl -s --connect-timeout 2 --max-time 5 https://ifconfig.me || true)"'
    - nslookup $DEPLOY_HOST || true
    - nc -vz -w 5 $DEPLOY_HOST 22 || true
  script:
    - ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST "cd /opt/lacos/lac-app && git pull && docker compose -f docker-compose.dev.yml restart django"
  environment:
    name: development
    url: https://dev.lacos.uni-koeln.de
