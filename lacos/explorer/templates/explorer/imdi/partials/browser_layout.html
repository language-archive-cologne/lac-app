{% load i18n %}

{% if not in_modal %}
  <div class="mb-6">
    <a href="{% url 'explorer:collection_detail' pk=collection.pk %}"
       class="inline-flex items-center text-base-content/70 hover:text-base-content font-medium">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      {% translate "Back to Collection" %}
    </a>
  </div>
{% endif %}

<div class="bg-base-100 border border-base-300 rounded-xl {% if not in_modal %}shadow-sm{% endif %}">
  <div class="px-8 py-6 border-b border-base-300">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-3xl font-light text-base-content tracking-tight flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
          </svg>
          {% translate "IMDI Browser" %}
        </h1>
        <p class="mt-1 text-sm text-base-content/60">
          {{ collection.get_general_info.display_title|default:collection.identifier }}
        </p>
      </div>
      {% if in_modal %}
        <button type="button" class="btn btn-sm btn-circle btn-ghost" aria-label="{% translate 'Close IMDI browser' %}" data-modal-close>
          ✕
        </button>
      {% endif %}
    </div>
  </div>

  <div data-imdi-viewer
       data-bucket="{{ bucket }}"
       data-root-key="{{ root_key }}"
       data-xml-url="{% url 'explorer:imdi_xml' %}">
    <div class="flex items-center justify-center h-64">
      <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
  </div>
</div>
