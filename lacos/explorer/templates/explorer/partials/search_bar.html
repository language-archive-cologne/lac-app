{% load i18n %}
<form method="get" class="mb-8">
  <label for="search-query" class="sr-only">{% translate "Search" %}</label>
  <div class="join w-full">
    <input
      id="search-query"
      type="search"
      name="q"
      value="{{ search_query }}"
      placeholder="{% translate 'Search collections or bundles' %}"
      class="input input-bordered join-item w-full"
    >
    <button type="submit" class="btn btn-primary join-item">{% translate "Search" %}</button>
    {% if search_query %}
      <a href="{% url 'explorer:collection_list' %}" class="btn btn-ghost join-item">{% translate "Clear" %}</a>
    {% endif %}
  </div>
  <div class="flex justify-end mt-2">
    <a href="{% url 'faceted_search' %}{% if search_query %}?q={{ search_query|urlencode }}{% endif %}" class="link link-hover text-sm text-base-content/50 inline-flex items-center gap-1">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
      {% translate "Advanced Search" %}
    </a>
  </div>
</form>
