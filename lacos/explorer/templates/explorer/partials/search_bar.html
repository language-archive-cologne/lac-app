{% load i18n %}
<form method="get" class="mb-8">
  <label for="search-query" class="sr-only">{% translate "Search" %}</label>
  <div class="join w-full">
    <input
      id="search-query"
      type="search"
      name="q"
      value="{{ search_query }}"
      placeholder="{% translate 'Search collections or bundles' %}"
      class="input input-bordered join-item w-full"
      hx-get="{{ request.path }}"
      hx-target="#collection-search-results"
      hx-swap="innerHTML"
      hx-trigger="change, keyup delay:400ms"
      hx-push-url="true"
    >
    <button type="submit" class="btn btn-primary join-item">{% translate "Search" %}</button>
    {% if search_query %}
      <a href="{% url 'explorer:collection_list' %}" class="btn btn-ghost join-item">{% translate "Clear" %}</a>
    {% endif %}
  </div>
</form>
