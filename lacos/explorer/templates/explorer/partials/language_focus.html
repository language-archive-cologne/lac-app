{% load i18n %}
<div class="rounded-2xl border border-base-300 bg-base-100 shadow-sm h-full flex flex-col">
  <div class="px-4 py-3 border-b border-base-200 flex items-center justify-between">
    <span class="text-xs font-semibold uppercase tracking-widest text-base-content/60">{% translate "Languages" %}</span>
    {% if language_filter %}
      <a href="{% url 'explorer:collection_list' %}?sort={{ current_sort }}&order={{ current_order }}"
         hx-get="{% url 'explorer:collection_list' %}?sort={{ current_sort }}&order={{ current_order }}"
         hx-target="#collection-language-shell"
         hx-swap="outerHTML"
         hx-push-url="true"
         class="btn btn-ghost btn-xs">{% translate "Clear" %}</a>
    {% endif %}
  </div>
  <div class="flex-1 overflow-y-auto max-h-64 divide-y divide-base-200">
    {% for language in language_index %}
      <a href="{% url 'explorer:collection_list' %}?language={{ language.name|urlencode }}&sort={{ current_sort }}&order={{ current_order }}"
         hx-get="{% url 'explorer:collection_list' %}?language={{ language.name|urlencode }}&sort={{ current_sort }}&order={{ current_order }}"
         hx-target="#collection-language-shell"
         hx-swap="outerHTML"
         hx-push-url="true"
         class="flex items-center justify-between gap-2 px-4 py-2 text-sm hover:bg-base-200 transition-colors {% if language_filter|lower == language.name|lower or language_filter|lower == language.iso_639_3_code|lower %}bg-primary/10 text-primary font-medium{% else %}text-base-content/70{% endif %}"
         {% if language.glottolog_macroarea %}title="{{ language.glottolog_macroarea }}"{% endif %}>
        <span class="truncate">{{ language.name }}</span>
        <span class="flex items-center gap-2 text-xs {% if language_filter|lower == language.name|lower or language_filter|lower == language.iso_639_3_code|lower %}text-primary/70{% else %}text-base-content/50{% endif %}">
          <span class="font-mono uppercase">{{ language.iso_639_3_code }}</span>
          <span class="rounded-full {% if language_filter|lower == language.name|lower or language_filter|lower == language.iso_639_3_code|lower %}bg-primary/20 text-primary{% else %}bg-base-200 text-base-content/70{% endif %} px-2 py-0.5 text-xs font-semibold">{{ language.collections_count }}</span>
        </span>
      </a>
    {% empty %}
      <p class="px-4 py-3 text-sm text-base-content/60">{% translate "No languages available." %}</p>
    {% endfor %}
  </div>
</div>
