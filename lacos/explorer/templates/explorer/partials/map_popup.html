{% load i18n l10n static %}

<div class="flex items-center justify-between p-4 border-b border-base-300">
  <h3 class="text-lg font-semibold text-base-content">{{ title }}</h3>
  <button
    type="button"
    onclick="document.getElementById('map-modal').classList.add('hidden'); document.body.classList.remove('overflow-hidden');"
    class="p-1 rounded hover:bg-base-200 text-base-content/60 hover:text-base-content"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
  </button>
</div>
<div class="p-4">
  <div id="map-container" style="height: 400px; border-radius: 0.5rem;"></div>
  <p class="mt-2 text-xs text-base-content/60">
    {{ lat }}, {{ lng }}
  </p>
</div>

<link rel="stylesheet" href="{% static 'vendor/js/maplibre-gl/maplibre-gl.css' %}" />

<script>
  (function() {
    const MAPLIBRE_SRC = "{% static 'vendor/js/maplibre-gl/maplibre-gl.js' %}";
    const PMTILES_SRC = "{% static 'vendor/js/pmtiles/pmtiles.js' %}";

    const lat = {{ lat|unlocalize }};
    const lng = {{ lng|unlocalize }};
    const containerId = 'map-container';

    function ensureScript(src, isReady, key) {
      if (isReady()) return Promise.resolve();

      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[data-lac-script="${key}"]`);
        if (existing) {
          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error(`Failed to load ${src}`)), { once: true });
          return;
        }

        const script = document.createElement('script');
        script.src = src;
        script.async = false;
        script.dataset.lacScript = key;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.head.appendChild(script);
      });
    }

    function initMap() {
      if (window.maplibregl && window.pmtiles && !window.__lacPmtilesRegistered) {
        const protocol = new pmtiles.Protocol();
        maplibregl.addProtocol('pmtiles', protocol.tile);
        window.__lacPmtilesRegistered = true;
      }

      const container = document.getElementById(containerId);
      if (!container || !window.maplibregl) return;

      const map = new maplibregl.Map({
        container: container,
        style: '{{ map_style_url|escapejs }}',
        center: [lng, lat],
        zoom: 5,
        maxZoom: 6,
        fadeDuration: 0,
        canvasContextAttributes: { antialias: true }
      });

      map.addControl(new maplibregl.NavigationControl({ showCompass: false }));
      map.on('load', () => map.resize());
      requestAnimationFrame(() => map.resize());

      new maplibregl.Marker({ color: '#005176' })
        .setLngLat([lng, lat])
        .addTo(map);
    }

    ensureScript(MAPLIBRE_SRC, () => !!window.maplibregl, 'maplibre')
      .then(() => ensureScript(PMTILES_SRC, () => !!window.pmtiles, 'pmtiles'))
      .then(initMap)
      .catch(error => console.error('[lac-map-popup]', error));
  })();
</script>
