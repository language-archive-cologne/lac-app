{% load i18n l10n static %}

<div class="flex items-center justify-between p-4 border-b border-base-300">
  <h3 class="text-lg font-semibold text-base-content">{{ title }}</h3>
  <button
    type="button"
    data-map-modal-close
    class="p-1 rounded hover:bg-base-200 text-base-content/60 hover:text-base-content"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
  </button>
</div>
<div class="p-4">
  <div id="map-container"
       class="lac-map-popup"
       data-map-popup
       data-lat="{{ lat|unlocalize }}"
       data-lng="{{ lng|unlocalize }}"
       data-style-url="{{ map_style_url }}"
       data-maplibre-src="{% static 'vendor/js/maplibre-gl/maplibre-gl.js' %}"
       data-pmtiles-src="{% static 'vendor/js/pmtiles/pmtiles.js' %}"></div>
  <p class="mt-2 text-xs text-base-content/60">
    {{ lat }}, {{ lng }}
  </p>
</div>

<link rel="stylesheet" href="{% static 'vendor/js/maplibre-gl/maplibre-gl.css' %}" />
