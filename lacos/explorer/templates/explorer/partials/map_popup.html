{% load static %}
{% load i18n %}

<div class="flex items-center justify-between p-4 border-b border-base-300">
  <h3 class="text-lg font-semibold text-base-content">{{ title }}</h3>
  <button
    type="button"
    onclick="document.getElementById('map-modal').classList.add('hidden'); document.getElementById('map-modal').classList.remove('flex'); document.body.classList.remove('overflow-hidden');"
    class="p-1 rounded hover:bg-base-200 text-base-content/60 hover:text-base-content"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
  </button>
</div>
<div class="p-4">
  <div id="map-container" style="height: 400px; border-radius: 0.5rem;"></div>
</div>

<link rel="stylesheet" href="{% static 'vendor/js/maplibre-gl/maplibre-gl.css' %}" />
<script src="{% static 'vendor/js/maplibre-gl/maplibre-gl.js' %}"></script>
<script>
  (function() {
    const lat = {{ lat }};
    const lng = {{ lng }};
    const container = document.getElementById('map-container');

    const map = new maplibregl.Map({
      container: container,
      style: 'https://tiles.openfreemap.org/styles/bright',
      center: [lng, lat],
      zoom: 10
    });

    map.addControl(new maplibregl.NavigationControl());

    new maplibregl.Marker()
      .setLngLat([lng, lat])
      .addTo(map);
  })();
</script>
