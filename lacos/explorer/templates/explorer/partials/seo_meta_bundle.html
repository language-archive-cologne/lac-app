{% load i18n %}
<!-- Dynamic SEO Meta Tags for Bundle -->
<meta name="description" content="{% if bundle.get_general_info.description %}{{ bundle.get_general_info.description|truncatewords:30 }}{% else %}Language documentation bundle from the Language Archive Cologne containing audio, video recordings and linguistic analyses.{% endif %}" />
<link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{% url 'explorer:bundle_detail_by_handle' handle=bundle.identifier %}" />

<!-- Open Graph -->
<meta property="og:type" content="article" />
<meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{% url 'explorer:bundle_detail_by_handle' handle=bundle.identifier %}" />
<meta property="og:title" content="{% if bundle.get_general_info.display_title %}{{ bundle.get_general_info.display_title }}{% elif bundle.get_general_info.title %}{{ bundle.get_general_info.title }}{% else %}{{ bundle.identifier }}{% endif %}" />
<meta property="og:description" content="{% if bundle.get_general_info.description %}{{ bundle.get_general_info.description|truncatewords:30 }}{% else %}Language documentation bundle from the Language Archive Cologne.{% endif %}" />
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% load static %}{% static 'images/logo-LAC.png' %}" />
<meta property="og:site_name" content="Language Archive Cologne" />
<meta property="og:locale" content="{{ LANGUAGE_CODE }}" />

<!-- Twitter Cards -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:url" content="{{ request.scheme }}://{{ request.get_host }}{% url 'explorer:bundle_detail_by_handle' handle=bundle.identifier %}" />
<meta name="twitter:title" content="{% if bundle.get_general_info.display_title %}{{ bundle.get_general_info.display_title }}{% elif bundle.get_general_info.title %}{{ bundle.get_general_info.title }}{% else %}{{ bundle.identifier }}{% endif %}" />
<meta name="twitter:description" content="{% if bundle.get_general_info.description %}{{ bundle.get_general_info.description|truncatewords:30 }}{% else %}Language documentation bundle from the Language Archive Cologne.{% endif %}" />
<meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% load static %}{% static 'images/logo-LAC.png' %}" />
