{% load i18n %}
<details class="mb-2"{% if is_advanced_active %} open{% endif %}>
  <summary class="cursor-pointer text-sm font-medium text-primary hover:text-primary/80 transition-colors select-none inline-flex items-center gap-1.5 py-1">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
    </svg>
    {% translate "Advanced Search" %}
    {% if is_advanced_active %}
      <span class="badge badge-primary badge-xs">{% translate "active" %}</span>
    {% endif %}
  </summary>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 pt-3 pb-1">
    {% for field in advanced_fields %}
      <div>
        <label for="id_{{ field.param_name }}" class="label py-0.5">
          <span class="label-text text-xs font-medium">{{ field.label }}</span>
        </label>
        <input
          id="id_{{ field.param_name }}"
          type="text"
          name="{{ field.param_name }}"
          value="{{ field.value }}"
          placeholder="{{ field.placeholder }}"
          class="input input-bordered input-sm w-full"
        >
      </div>
    {% endfor %}
  </div>
</details>
