{% load static l10n %}
<link rel="stylesheet" href="{% static 'vendor/js/maplibre-gl/maplibre-gl.css' %}" />
<script src="{% static 'vendor/js/maplibre-gl/maplibre-gl.js' %}"></script>
<script src="{% static 'vendor/js/pmtiles/pmtiles.js' %}"></script>

<style>
  #map {
    width: {{ width|default:"100%" }};
    height: {{ height|default:"400px" }};
    border-radius: 0.5rem;
  }
</style>

<div id="map"></div>

<script>
  (function() {
    if (window.maplibregl && window.pmtiles && !window.__lacPmtilesRegistered) {
      const protocol = new pmtiles.Protocol();
      maplibregl.addProtocol('pmtiles', protocol.tile);
      window.__lacPmtilesRegistered = true;
    }

    const lat = {{ lat|default:"50.9254927"|unlocalize }};
    const lng = {{ lng|default:"6.9328194"|unlocalize }};
    // NE pmtiles tops out at z6 — a detail view of a single point is most
    // legible at country scale.
    const zoom = {{ zoom|default:"5" }};

    const map = new maplibregl.Map({
      style: '{{ map_style_url|escapejs }}',
      center: [lng, lat],
      zoom: zoom,
      maxZoom: 6,
      container: 'map',
      canvasContextAttributes: { antialias: true }
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }));

    new maplibregl.Marker({ color: '#005176' })
      .setLngLat([lng, lat])
      .addTo(map);
  })();
</script>
