{% load static i18n %}
{% with size=size|default:"md" %}
  {% if language.iso_639_3_code %}
    <span class="inline-flex items-center gap-1.5 rounded-md font-medium bg-base-200 text-base-content border border-base-300 {% if size == 'sm' %}px-2 py-0.5 text-[11px]{% else %}px-2.5 py-1 text-xs{% endif %}">
      <span>{{ language.name }}</span>
      <span class="text-base-content/60">[{{ language.iso_639_3_code }}]</span>
      <a href="https://glottolog.org/resource/languoid/iso/{{ language.iso_639_3_code }}"
         target="_blank" rel="noopener"
         title="{% translate 'Open in Glottolog' %}"
         class="inline-flex items-center">
        <span class="inline-flex items-center justify-center rounded-sm bg-black/80 p-0.5">
          <img src="{% static 'images/glottolog_logo.png' %}"
               alt="{% translate 'Glottolog' %}"
               class="{% if size == 'sm' %}h-2.5 w-2.5{% else %}h-3 w-3{% endif %}" />
        </span>
      </a>
    </span>
  {% else %}
    <span class="inline-flex items-center rounded-md font-medium bg-base-200 text-base-content border border-base-300 {% if size == 'sm' %}px-2 py-0.5 text-[11px]{% else %}px-2.5 py-1 text-xs{% endif %}">
      {{ language.name }}
    </span>
  {% endif %}
{% endwith %}
