{% load i18n %}
{% load explorer_extras %}
{% if active_filters %}
  <div class="flex flex-wrap items-center gap-2 mb-4">
    {% for chip in active_filters %}
      {% facet_remove_url chip.facet_name chip.value as remove_url %}
      <a href="{{ remove_url }}"
         hx-get="{{ remove_url }}"
         hx-target="#faceted-results"
         hx-swap="outerHTML"
         hx-push-url="true"
         class="inline-flex items-center gap-1.5 rounded-full border border-primary/30 bg-primary/10 px-3 py-1 text-xs font-medium text-primary hover:bg-primary/20 transition-colors">
        <span class="text-base-content/50">{{ chip.facet_label }}:</span>
        {{ chip.label }}
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </a>
    {% endfor %}
    {% clear_all_filters_url as clear_url %}
    <a href="{{ clear_url }}"
       hx-get="{{ clear_url }}"
       hx-target="#faceted-results"
       hx-swap="outerHTML"
       hx-push-url="true"
       class="text-xs text-base-content/50 hover:text-error transition-colors">{% translate "Clear all" %}</a>
  </div>
{% endif %}
