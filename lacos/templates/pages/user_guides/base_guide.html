{% extends "base.html" %}
{% load static %}

{% block title %}{% block guide_title %}User Guides{% endblock %} - LAC{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="mb-6">
    <a href="{% url 'user-guides' %}" class="text-blue-600 hover:underline text-sm">
      &larr; Back to User Guides
    </a>
  </div>

  <div class="bg-white shadow rounded-lg p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{% block guide_heading %}{% endblock %}</h1>

    <div class="prose max-w-none text-gray-600">
      {% block guide_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
