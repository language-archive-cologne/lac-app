{% extends "base.html" %}

{% block title %}{{ title }} - LAC{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
  <!-- Back link -->
  <div class="mb-6">
    <a href="{% url 'user-guides' %}" class="inline-flex items-center gap-2 text-primary hover:text-primary/80 text-sm font-medium transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Documentation
    </a>
  </div>

  <!-- Hero Header -->
  <div class="relative overflow-hidden bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 rounded-xl mb-8">
    <div class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\"30\" height=\"30\" viewBox=\"0 0 30 30\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpath d=\"M1.22676 0C1.91374 0 2.45351 0.539773 2.45351 1.22676C2.45351 1.91374 1.91374 2.45351 1.22676 2.45351C0.539773 2.45351 0 1.91374 0 1.22676C0 0.539773 0.539773 0 1.22676 0Z\" fill=\"rgba(255,255,255,0.05)\"%3E%3C/path%3E%3C/svg%3E')] opacity-40"></div>
    <div class="relative px-8 py-10">
      <h1 class="text-2xl md:text-3xl font-bold text-white">{{ title }}</h1>
    </div>
  </div>

  <!-- Content with TOC -->
  <div class="flex flex-col lg:flex-row gap-8">
    <!-- Table of Contents (sticky sidebar) -->
    <aside class="lg:w-64 lg:shrink-0 order-2 lg:order-1">
      <nav id="guide-toc" class="lg:sticky lg:top-8 bg-base-100 border border-base-300 rounded-xl p-5 hidden">
        <h2 class="text-sm font-semibold text-base-content uppercase tracking-wide mb-4">On this page</h2>
        <ul id="toc-list" class="space-y-2 text-sm">
          <!-- Populated by JavaScript -->
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 order-1 lg:order-2 min-w-0">
      <div class="bg-base-100 border border-base-300 rounded-xl p-8">
        <article id="guide-content" class="guide-prose prose prose-slate max-w-none
          prose-headings:scroll-mt-8
          prose-h2:text-xl prose-h2:font-semibold prose-h2:text-base-content prose-h2:mt-10 prose-h2:mb-4 prose-h2:pb-2 prose-h2:border-b prose-h2:border-base-300
          prose-h3:text-lg prose-h3:font-medium prose-h3:text-base-content prose-h3:mt-6 prose-h3:mb-3
          prose-p:text-base-content/80 prose-p:leading-relaxed
          prose-strong:text-base-content prose-strong:font-semibold
          prose-a:text-primary prose-a:no-underline hover:prose-a:underline
          prose-ul:text-base-content/80 prose-ol:text-base-content/80
          prose-li:marker:text-base-content/50
          prose-code:text-sm prose-code:font-medium prose-code:bg-base-200 prose-code:text-base-content prose-code:px-1.5 prose-code:py-0.5 prose-code:rounded prose-code:before:content-none prose-code:after:content-none
          prose-pre:bg-slate-900 prose-pre:text-slate-50 prose-pre:rounded-lg
          prose-blockquote:border-l-primary prose-blockquote:text-base-content/70 prose-blockquote:not-italic
          prose-table:text-sm
          prose-th:text-base-content prose-th:font-semibold prose-th:bg-base-200
          prose-td:text-base-content/80
        ">
          {{ content|safe }}
        </article>
      </div>

      {% if version %}
      <div class="mt-6 flex items-center justify-end">
        <span class="inline-flex items-center gap-1.5 text-xs text-base-content/50 bg-base-100 border border-base-300 rounded-full px-3 py-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
          </svg>
          Version {{ version }}
        </span>
      </div>
      {% endif %}
    </main>
  </div>
</div>

{% block inline_javascript %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const content = document.getElementById('guide-content');
  const tocNav = document.getElementById('guide-toc');
  const tocList = document.getElementById('toc-list');

  if (!content || !tocList) return;

  // Clear any existing TOC items
  tocList.innerHTML = '';

  // Find all h2 and h3 headings
  const headings = content.querySelectorAll('h2, h3');
  const aside = tocNav ? tocNav.parentElement : null;

  if (headings.length < 2) {
    // Hide TOC and collapse sidebar if less than 2 headings
    if (aside) aside.classList.add('hidden');
    return;
  }

  // Show TOC sidebar
  if (aside) aside.classList.remove('hidden');
  if (tocNav) tocNav.classList.remove('hidden');

  // Build TOC
  headings.forEach((heading, index) => {
    // Ensure heading has an ID
    if (!heading.id) {
      heading.id = 'section-' + index;
    }

    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#' + heading.id;
    a.textContent = heading.textContent;
    a.className = heading.tagName === 'H3'
      ? 'block pl-3 text-base-content/60 hover:text-primary transition-colors border-l border-base-300 hover:border-primary'
      : 'block text-base-content/80 hover:text-primary font-medium transition-colors';

    li.appendChild(a);
    tocList.appendChild(li);
  });

  // Highlight current section on scroll
  const observerOptions = {
    rootMargin: '-80px 0px -80% 0px',
    threshold: 0
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const id = entry.target.id;
      const tocLink = tocList.querySelector('a[href="#' + id + '"]');
      if (tocLink) {
        if (entry.isIntersecting) {
          tocList.querySelectorAll('a').forEach(a => a.classList.remove('text-primary', '!border-primary'));
          tocLink.classList.add('text-primary');
          if (tocLink.classList.contains('border-l')) {
            tocLink.classList.add('!border-primary');
          }
        }
      }
    });
  }, observerOptions);

  headings.forEach(heading => observer.observe(heading));
});
</script>
{% endblock %}
{% endblock %}
