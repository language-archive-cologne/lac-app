{% if bundles %}
{% for b in bundles %}
<tr class="bg-base-200/30 text-sm">
    <td class="pl-8">
        <span class="text-base-content/40 mr-1">&lfloor;</span>{{ b.bundle_id }}
    </td>
    <td class="text-right tabular-nums">{{ b.total }}</td>
    <td class="text-right tabular-nums {% if b.with_peaks == b.total %}text-success{% elif b.with_peaks == 0 %}text-error{% else %}text-warning{% endif %}">{{ b.with_peaks }}</td>
    <td class="text-right tabular-nums {% if b.with_spectrogram == b.total %}text-success{% elif b.with_spectrogram == 0 %}text-error{% else %}text-warning{% endif %}">{{ b.with_spectrogram }}</td>
    <td class="text-right tabular-nums {% if b.with_pitch == b.total %}text-success{% elif b.with_pitch == 0 %}text-error{% else %}text-warning{% endif %}">{{ b.with_pitch }}</td>
    <td class="text-right tabular-nums text-info">{{ b.complete }}</td>
    <td class="text-right tabular-nums {% if b.missing_all > 0 %}text-error font-semibold{% endif %}">{{ b.missing_all }}</td>
    <td class="w-32">
        <div class="flex items-center gap-2">
            <div class="w-full bg-base-300 rounded-full h-2 overflow-hidden">
                <div class="h-full rounded-full {% if b.pct_complete == 100 %}bg-success{% elif b.pct_complete > 0 %}bg-warning{% else %}bg-error{% endif %}" style="width:{{ b.pct_complete }}%"></div>
            </div>
            <span class="text-xs tabular-nums text-base-content/60 w-8 text-right">{{ b.pct_complete }}%</span>
        </div>
    </td>
</tr>
{% endfor %}
{% else %}
<tr class="bg-base-200/30">
    <td colspan="8" class="pl-8 text-sm text-base-content/50">No bundles found for {{ collection_id }}</td>
</tr>
{% endif %}
