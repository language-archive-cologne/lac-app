<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Source of truth for the social-share card. Edit here, then re-render:
       rsvg-convert -w 1200 -h 630 og-image.svg -o og-image.png
       Palette: UzK navbar (#003a54 -> #005176, accent #009dcc). Font: Albert Sans. -->
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.40" r="0.95">
      <stop offset="0" stop-color="#005176"/>
      <stop offset="1" stop-color="#003047"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#009dcc" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#009dcc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="6" fill="#009dcc"/>

  <image x="485" y="74" width="230" height="100" xlink:href="data:image/png;base64,"/>

  <text x="600" y="282" text-anchor="middle" font-family="Albert Sans" font-weight="700"
        font-size="78" fill="#FFFFFF" letter-spacing="-1.5">Language Archive Cologne</text>

  <text x="600" y="342" text-anchor="middle" font-family="Albert Sans" font-weight="400"
        font-size="34" fill="#8FBDD4">University of Cologne</text>

  <text x="600" y="452" text-anchor="middle" font-family="Albert Sans" font-weight="400"
        font-size="27" fill="#6FA3BC">A digital repository for language documentation</text>

  <text x="600" y="566" text-anchor="middle" font-family="Albert Sans" font-weight="500"
        font-size="25" fill="#33B8DE" letter-spacing="0.3">lac.uni-koeln.de</text>
</svg>
