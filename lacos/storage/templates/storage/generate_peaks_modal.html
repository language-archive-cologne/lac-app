<!-- Generate Peaks Modal Content -->
<h3 class="font-bold text-lg mb-4">Generate Audio Peaks</h3>

<div class="mb-4">
    <p class="text-gray-700 mb-2">
        Scan {% if folder_path %}<strong>{{ folder_path }}</strong> in {% endif %}bucket
        <strong>{{ bucket_name }}</strong> for audio files and generate waveform peaks.
    </p>
    <p class="text-sm text-gray-600">Files with existing peaks will be skipped.</p>
</div>

<div id="generate-peaks-status" class="mb-4">
    <!-- Status messages will appear here -->
</div>

<div class="modal-action" id="generate-peaks-actions">
    <label for="generate-peaks-modal" class="btn btn-outline">Close</label>
    <button
        type="button"
        class="btn btn-primary"
        hx-post="{% if folder_path %}{% url 'storage:generate_peaks_folder' bucket_name=bucket_name folder_path=folder_path %}{% else %}{% url 'storage:generate_peaks' bucket_name=bucket_name %}{% endif %}"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
        hx-target="#generate-peaks-status"
        hx-swap="innerHTML"
        hx-indicator="#indicator"
    >
        Start
    </button>
</div>

<script>
document.addEventListener('peaksGenerationStarted', function () {
    var actions = document.getElementById('generate-peaks-actions');
    if (actions) {
        actions.innerHTML = '<label for="generate-peaks-modal" class="btn">Close</label>';
    }
});
</script>
