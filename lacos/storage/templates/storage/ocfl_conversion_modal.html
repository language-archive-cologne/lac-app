<!-- OCFL Conversion Modal Content -->
<h3 class="font-bold text-lg mb-4">Convert to OCFL Format</h3>

<div class="mb-4">
    <p class="text-gray-700 mb-2">Convert folder <strong>{{ folder_path }}</strong> to OCFL format in bucket <strong>{{ bucket_name }}</strong>.</p>
    <p class="text-sm text-gray-600">This will restructure the folder according to OCFL specifications while preserving all file content.</p>
</div>

<div class="form-control mb-4">
    <label class="label cursor-pointer">
        <span class="label-text">Create backup before conversion</span>
        <input
            type="checkbox"
            id="ocfl-backup-checkbox"
            class="checkbox checkbox-primary"
            checked
        />
    </label>
    <div class="label">
        <span class="label-text-alt text-base-content/60">Recommended: Creates a backup copy before making changes</span>
    </div>
</div>

<div id="ocfl-conversion-status" class="mb-4">
    <!-- Status messages will appear here -->
</div>

<div class="modal-action">
    <label for="ocfl-conversion-modal" class="btn">Cancel</label>
    <button
        type="button"
        class="btn btn-primary"
        hx-post="{% url 'storage:convert_to_ocfl' bucket_name=bucket_name folder_path=folder_path %}"
        hx-target="#ocfl-conversion-status"
        hx-swap="innerHTML"
        hx-vals='js:{"create_backup": document.getElementById("ocfl-backup-checkbox").checked}'
        hx-indicator="#indicator"
    >
        Convert to OCFL
    </button>
</div>
