<!-- OCFL Conversion Modal Content -->
<h3 class="font-bold text-lg mb-4">Convert to OCFL Format</h3>

<div class="mb-4">
    <p class="text-gray-700 mb-2">Convert folder <strong>{{ folder_path }}</strong> to OCFL format in bucket <strong>{{ bucket_name }}</strong>.</p>
    <p class="text-sm text-gray-600">This will restructure the folder according to OCFL specifications while preserving all file content.</p>
</div>

<div id="ocfl-conversion-status" class="mb-4">
    <!-- Status messages will appear here -->
</div>

<div class="modal-action" id="ocfl-conversion-actions">
    <label for="ocfl-conversion-modal" class="btn btn-outline">Close</label>
    <button
        type="button"
        class="btn btn-primary"
        hx-post="{% url 'storage:convert_to_ocfl' bucket_name=bucket_name folder_path=folder_path %}"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
        hx-target="#ocfl-conversion-status"
        hx-swap="innerHTML"
        hx-indicator="#indicator"
    >
        Start conversion
    </button>
</div>

<script>
document.addEventListener('ocflConversionStarted', function () {
    const actions = document.getElementById('ocfl-conversion-actions');
    if (actions) {
        actions.innerHTML = '<label for="ocfl-conversion-modal" class="btn">Close</label>';
    }
});
</script>
