<div class="card bg-base-100 shadow-sm h-full">
  <div class="card-body space-y-4">
    <h2 class="card-title text-lg">Settings</h2>
    <form
      class="space-y-3"
      method="post"
      action="{% url 'storage:acl_update_settings' %}"
      hx-post="{% url 'storage:acl_update_settings' %}"
      hx-target="#acl-settings-card"
      hx-swap="outerHTML"
    >
      {% csrf_token %}
      <label class="label cursor-pointer justify-start gap-3">
        <input
          type="checkbox"
          id="enforcement_enabled"
          name="enforcement_enabled"
          class="checkbox checkbox-primary"
          {% if acl_flags.ACL_ENFORCEMENT_ENABLED %}checked{% endif %}
        >
        <span class="label-text">Enforcement enabled</span>
      </label>

      <label class="label cursor-pointer justify-start gap-3">
        <input
          type="checkbox"
          id="log_access_attempts"
          name="log_access_attempts"
          class="checkbox checkbox-primary"
          {% if acl_flags.ACL_LOG_ACCESS_ATTEMPTS %}checked{% endif %}
        >
        <span class="label-text">Log access attempts</span>
      </label>

      <label class="label cursor-pointer justify-start gap-3">
        <input
          type="checkbox"
          id="default_deny"
          name="default_deny"
          class="checkbox checkbox-primary"
          {% if acl_flags.ACL_DEFAULT_DENY %}checked{% endif %}
        >
        <span class="label-text">Default deny</span>
      </label>

      <button type="submit" class="btn btn-secondary w-full">
        Save changes
      </button>
    </form>
  </div>
</div>
