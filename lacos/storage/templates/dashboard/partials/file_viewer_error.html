<!-- OOB header update for error state -->
<div id="file-viewer-header" hx-swap-oob="true" class="flex items-center justify-between px-6 py-4 border-b border-base-300 shrink-0">
    <div>
        <h3 class="font-bold text-lg">{{ file_name|default:"File" }}</h3>
    </div>
    <div class="flex items-center gap-2">
        <button type="button" class="btn btn-sm btn-ghost" data-close-file-viewer>✕</button>
    </div>
</div>

<!-- Error content -->
<div class="alert alert-error">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z" />
    </svg>
    <div>
        <h4 class="font-semibold">Unable to load {{ file_name|default:"file" }}</h4>
        <p class="text-sm">{{ error|default:"The file could not be previewed." }}</p>
    </div>
</div>
