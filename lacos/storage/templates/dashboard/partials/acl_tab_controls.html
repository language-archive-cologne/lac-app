<div id="acl-tab-controls" class="tabs tabs-boxed w-fit" role="tablist" {% if hx_oob %}hx-swap-oob="outerHTML"{% endif %}>
  <button
    type="button"
    class="tab {% if active_tab == 'dashboard' %}tab-active{% endif %}"
    hx-get="{% url 'storage:acl_dashboard_panel' %}"
    hx-target="#acl-tab-content"
    hx-swap="innerHTML"
    hx-push-url="false"
  >
    Dashboard
  </button>
  <button
    type="button"
    class="tab {% if active_tab == 'records' %}tab-active{% endif %}"
    hx-get="{% url 'storage:acl_records_panel' %}?scope={{ records_scope|default:'collection' }}"
    hx-target="#acl-tab-content"
    hx-swap="innerHTML"
    hx-push-url="false"
  >
    ACL Records
  </button>
</div>
