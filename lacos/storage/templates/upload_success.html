{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6 text-center">
        <svg class="mx-auto h-16 w-16 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        
        <h1 class="text-3xl font-bold mt-4 mb-2 text-gray-800">Upload Successful!</h1>
        
        <p class="text-lg text-gray-600 mb-6">
            Your files have been successfully uploaded to the ingest bucket.
        </p>
        
        {% if messages %}
            <div class="mb-6 bg-green-50 border border-green-200 rounded-md p-4">
                {% for message in messages %}
                    <p class="text-green-700">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
        
        <div class="flex justify-center space-x-4">
            <a href="{% url 'storage:archivist_dashboard' %}" 
               class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                Return to Dashboard
            </a>
            <a href="{% url 'storage:upload_form' %}" 
               class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                Upload Another Folder
            </a>
        </div>
    </div>
</div>
{% endblock %}
