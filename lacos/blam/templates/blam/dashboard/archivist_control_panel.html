{% extends "base.html" %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6" hx-boost="true">
    <script>
        document.body.addEventListener('htmx:configRequest', function(evt) {
            evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });
    </script>
    <div class="mb-8 flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
        <div>
            <h1 class="text-3xl font-bold">{{ title }}</h1>
            <p class="text-lg text-base-content/70">Metadata operations</p>
        </div>
    </div>

    <div class="card bg-base-100 shadow">
        <div class="card-body space-y-4">
            <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                <div>
                    <h2 class="card-title">Metadata workspace</h2>
                    <p class="text-sm text-base-content/60">Search and open editors without leaving the dashboard.</p>
                </div>
                <div id="metadata-meta" class="text-xs text-base-content/60">
                    <span class="loading loading-spinner loading-xs"></span>
                </div>
            </div>
            <div
                id="metadata-panel"
                hx-get="{% url 'blam:blam_metadata_panel' %}"
                hx-trigger="load"
                hx-target="#metadata-panel"
                hx-swap="outerHTML"
            >
                <div class="flex items-center justify-center py-10">
                    <span class="loading loading-spinner loading-md"></span>
                    <span class="ml-3 text-sm text-base-content/60">Loading metadata...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Metadata Editor Modal -->
    <dialog id="metadata-editor-modal" class="modal"
        hx-on::before-history-update="if(this.open) event.preventDefault()"
    >
        <div class="modal-box w-11/12 max-w-7xl h-[90vh] flex flex-col p-0">
            <div class="flex items-center justify-between px-6 py-3 border-b border-base-300">
                <h3 class="font-bold text-lg">Metadata Editor</h3>
                <form method="dialog">
                    <button class="btn btn-sm btn-circle btn-ghost">X</button>
                </form>
            </div>
            <div
                id="metadata-editor-modal-content"
                class="flex-1 overflow-y-auto p-6"
                hx-boost="true"
                hx-target="#metadata-editor"
                hx-select="#metadata-editor"
                hx-swap="outerHTML"
                hx-on::after-swap="var d=this.closest('dialog'); if(d && !d.open) d.showModal()"
            >
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
</div>
{% endblock %}
