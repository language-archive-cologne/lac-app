{% extends "blam/metadata/base_editor.html" %}

{% block editor_content %}
<h1 class="text-xl font-semibold mb-4">Bundle publication info</h1>
<form method="post"
      hx-boost="true"
      hx-target="#metadata-editor"
      hx-select="#metadata-editor"
      hx-swap="outerHTML"
      class="space-y-4">
  {% csrf_token %}
  {% include "blam/metadata/partials/form_fields.html" with form=form %}
  <button class="btn btn-primary" type="submit">Save</button>
</form>

<div class="mt-8 space-y-6">
  <div id="bundle-creators-panel"
       hx-get="{% url 'blam:bundle_publication_reference_panel' bundle_id=bundle.pk reference_slug='creators' %}"
       hx-trigger="load"
       hx-target="this"
       hx-swap="outerHTML">
    <div class="p-4 text-sm text-base-content/70">Loading creators...</div>
  </div>

  <div id="bundle-contributors-panel"
       hx-get="{% url 'blam:bundle_publication_reference_panel' bundle_id=bundle.pk reference_slug='contributors' %}"
       hx-trigger="load"
       hx-target="this"
       hx-swap="outerHTML">
    <div class="p-4 text-sm text-base-content/70">Loading contributors...</div>
  </div>

  <p class="text-sm text-base-content/70">
    Need contributor names? <a class="link" href="{% url 'blam:metadata_reference_list' reference_slug='bundle-contributor-names' %}">Manage contributor names</a>.
  </p>
</div>
{% endblock %}
