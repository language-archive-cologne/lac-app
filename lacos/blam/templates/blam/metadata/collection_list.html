{% extends "base.html" %}

{% block content %}
<div class="mb-6">
  <a href="{% url 'blam:blam_archivist_dashboard' %}" class="btn btn-ghost btn-sm gap-1 -ml-2 mb-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
    Dashboard
  </a>
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold">Collections</h1>
    <a class="btn btn-primary" href="{% url 'blam:collection_metadata_create' %}">New collection</a>
  </div>
</div>

<div class="card bg-base-100 shadow">
  <div class="card-body">
    <form method="get" class="mb-4">
      <input
        type="search"
        name="q"
        value="{{ search_query }}"
        placeholder="Search by title, handle or description..."
        class="input input-bordered w-full max-w-md"
        hx-get="{% url 'blam:collection_metadata_list' %}"
        hx-target="#collection-table-container"
        hx-swap="innerHTML"
        hx-trigger="change, keyup delay:400ms"
      >
    </form>
    <div id="collection-table-container" class="overflow-x-auto">
      {% include "blam/metadata/partials/collection_table.html" %}
      {% include "blam/metadata/partials/pagination.html" %}
    </div>
  </div>
</div>
{% endblock %}
