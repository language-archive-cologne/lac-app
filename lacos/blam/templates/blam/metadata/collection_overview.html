{% extends "blam/metadata/base_editor.html" %}

{% block editor_content %}
<div class="flex justify-between items-center mb-4">
  <h1 class="text-xl font-semibold">Collection overview</h1>
  <a href="{% url 'blam:collection_export_jsonld' collection.id %}"
     class="btn btn-outline btn-sm gap-2"
     download>
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
    </svg>
    Export JSON-LD
  </a>
</div>
<form method="post"
      hx-boost="true"
      hx-target="#metadata-editor"
      hx-select="#metadata-editor"
      hx-swap="outerHTML"
      class="space-y-4">
  {% csrf_token %}
  {% include "blam/metadata/partials/form_fields.html" with form=form %}
  <button class="btn btn-primary" type="submit">Save</button>
</form>
{% endblock %}
