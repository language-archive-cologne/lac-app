{% extends "blam/metadata/base_editor.html" %}

{% block editor_content %}
<h1 class="text-xl font-semibold mb-4">Collection structural info</h1>
<form method="post"
      hx-boost="true"
      hx-target="#metadata-editor"
      hx-select="#metadata-editor"
      hx-swap="outerHTML"
      class="space-y-4">
  {% csrf_token %}
  {% include "blam/metadata/partials/form_fields.html" with form=form %}
  <button class="btn btn-primary" type="submit">Save</button>
</form>

<div class="mt-8 space-y-6">
  <div id="collection-structural-additional-metadata-files-panel"
       hx-get="{% url 'blam:collection_structural_reference_panel' collection_id=collection.pk reference_slug='additional-metadata-files' %}"
       hx-trigger="load"
       hx-target="this"
       hx-swap="outerHTML">
    <div class="p-4 text-sm text-base-content/70">Loading additional metadata files...</div>
  </div>
</div>
{% endblock %}
