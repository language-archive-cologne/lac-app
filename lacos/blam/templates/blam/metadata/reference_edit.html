{% extends "base.html" %}

{% block content %}
<div id="reference-content">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-semibold">{{ title }}</h1>
    <a class="btn btn-outline"
       href="{% url 'blam:metadata_reference_list' reference_slug=reference_slug %}"
       hx-get="{% url 'blam:metadata_reference_list' reference_slug=reference_slug %}"
       hx-target="#reference-content"
       hx-select="#reference-content"
       hx-swap="outerHTML"
       hx-push-url="true">Back</a>
  </div>

  <div class="card bg-base-100 shadow">
    <div class="card-body">
      <form method="post"
            hx-boost="true"
            hx-target="#reference-content"
            hx-select="#reference-content"
            hx-swap="outerHTML"
            class="space-y-4">
        {% csrf_token %}
        {% include "blam/metadata/partials/form_fields.html" with form=form %}
        <div class="flex gap-2">
          <button class="btn btn-primary" type="submit">Save</button>
          <button class="btn btn-outline" type="submit" formaction="{% url 'blam:metadata_reference_delete' reference_slug=reference_slug object_id=object.pk %}" formmethod="post">Delete</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
