{% extends "blam/metadata/base_editor.html" %}

{% block editor_content %}
<h1 class="text-xl font-semibold mb-4">Collection administrative info</h1>
<form method="post"
      hx-boost="true"
      hx-target="#metadata-editor"
      hx-select="#metadata-editor"
      hx-swap="outerHTML"
      class="space-y-4">
  {% csrf_token %}
  {% include "blam/metadata/partials/form_fields.html" with form=form %}
  <button class="btn btn-primary" type="submit">Save</button>
</form>

<div class="mt-8 space-y-6">
  <div id="collection-admin-licenses-panel"
       hx-get="{% url 'blam:collection_administrative_reference_panel' collection_id=collection.pk reference_slug='licenses' %}"
       hx-trigger="load"
       hx-target="this"
       hx-swap="outerHTML">
    <div class="p-4 text-sm text-base-content/70">Loading licenses...</div>
  </div>

  <div id="collection-admin-rights-holders-panel"
       hx-get="{% url 'blam:collection_administrative_reference_panel' collection_id=collection.pk reference_slug='rights-holders' %}"
       hx-trigger="load"
       hx-target="this"
       hx-swap="outerHTML">
    <div class="p-4 text-sm text-base-content/70">Loading rights holders...</div>
  </div>

  <div id="collection-admin-identical-resources-panel"
       hx-get="{% url 'blam:collection_administrative_reference_panel' collection_id=collection.pk reference_slug='identical-resources' %}"
       hx-trigger="load"
       hx-target="this"
       hx-swap="outerHTML">
    <div class="p-4 text-sm text-base-content/70">Loading identical resources...</div>
  </div>
</div>
{% endblock %}
