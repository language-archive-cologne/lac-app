{% extends "blam/metadata/base_editor.html" %}

{% block editor_content %}
<h1 class="text-xl font-semibold mb-4">Collection header</h1>
<form method="post"
      hx-boost="true"
      hx-target="#metadata-editor"
      hx-select="#metadata-editor"
      hx-swap="outerHTML"
      class="space-y-4">
  {% csrf_token %}
  {% include "blam/metadata/partials/form_fields.html" with form=form %}
  <button class="btn btn-primary" type="submit">Save</button>
</form>
{% endblock %}
